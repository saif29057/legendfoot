<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Product Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }

        .controls-section {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .product-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175);
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 3rem;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 600;
            color: #212529;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 1.25rem;
            color: #28a745;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .product-stock {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .product-actions .btn {
            flex: 1;
            padding: 0.4rem 0.5rem;
            font-size: 0.8rem;
        }

        .badge-status {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
        }

        .product-card {
            position: relative;
        }

        .no-products {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }

        .no-products i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 0.75rem;
            padding: 3rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <main class="container-fluid py-5">
        <!-- Page Header -->
        <div class="page-header mb-4">
            <h1>Product Management</h1>
            <p class="mb-0 mt-2">Manage your product catalog</p>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Search products by name...">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="fas fa-search me-2"></i>Search
                        </button>
                    </div>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <a href="/products/new" class="btn btn-primary">
                        <i class="fas fa-plus me-2"></i>Add New Product
                    </a>
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="product-grid">
            <!-- Sample Product Cards -->
            <div class="product-card">
                <div class="product-image">
                    <i class="fas fa-image"></i>
                </div>
                <div class="product-info">
                    <div class="product-name">Sample Product</div>
                    <div class="product-price">$99.99</div>
                    <div class="product-stock">
                        <i class="fas fa-box me-1"></i>50 in stock
                    </div>
                    <div class="product-actions">
                        <a href="#" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-edit"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this product?');">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state mt-5" style="display: none;">
            <i class="fas fa-box"></i>
            <h5>No products found</h5>
            <p class="text-muted mb-3">Start by adding your first product to your catalog</p>
            <a href="/products/new" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Create First Product
            </a>
        </div>

        <!-- Back to Dashboard -->
        <div class="mt-5">
            <a href="/admin/dashboard" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
