<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-5">
        <div class="mb-4">
            <a class="btn btn-outline-secondary" th:href="@{/orders}">Back to orders</a>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <h1 class="h3 mb-3" th:text="'Order #' + ${order.id}">Order</h1>
                <div class="row g-3">
                    <div class="col-md-4"><strong>Status:</strong> <span th:text="${order.status}">PENDING</span></div>
                    <div class="col-md-4"><strong>Date:</strong> <span th:text="${order.orderDate}">date</span></div>
                    <div class="col-md-4"><strong>Total:</strong> <span th:text="${'$' + order.totalPrice}">$0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="h5 mb-3">Items</h2>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Unit price</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.productName}">Product</td>
                                <td th:text="${item.quantity}">1</td>
                                <td th:text="${'$' + item.unitPrice}">$0.00</td>
                                <td th:text="${'$' + item.subtotal}">$0.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
