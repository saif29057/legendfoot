<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
                            <div>
                                <h1 class="h3 mb-2">My profile</h1>
                                <p class="text-muted mb-0">View and manage your account details.</p>
                            </div>
                            <span class="badge bg-secondary fs-6"
                                th:text="${isAdmin ? 'Admin' : 'Customer'}">Customer</span>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Username</label>
                                <div class="form-control bg-light" th:text="${userDto.username}">username</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Email</label>
                                <div class="form-control bg-light" th:text="${userDto.email}">email</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Role</label>
                                <div class="form-control bg-light" th:text="${userDto.role}">USER</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Account status</label>
                                <div class="form-control bg-light"
                                    th:text="${userDto.enabled ? 'Enabled' : 'Disabled'}">Enabled</div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 flex-wrap">
                            <a class="btn btn-primary" th:href="@{/users/profile/edit}"><i
                                    class="fas fa-pen me-2"></i>Edit profile</a>
                            <a class="btn btn-outline-secondary" th:href="@{/users/change-password}"><i
                                    class="fas fa-key me-2"></i>Change password</a>
                            <a class="btn btn-outline-primary" th:href="@{/orders}"><i
                                    class="fas fa-receipt me-2"></i>My orders</a>
                            <a class="btn btn-outline-success" th:href="@{/cart}"><i
                                    class="fas fa-shopping-cart me-2"></i>My cart</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
