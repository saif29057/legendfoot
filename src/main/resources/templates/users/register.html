<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Register - LegendFoot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-gradient-start: #667eea;
            --primary-gradient-end: #764ba2;
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eaf6 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
        }

        .register-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: slideInUp 0.6s ease-out;
        }

        .register-sidebar {
            background: linear-gradient(135deg, var(--primary-gradient-start), var(--primary-gradient-end));
            color: white;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .register-sidebar::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
        }

        .register-sidebar-content {
            position: relative;
            z-index: 1;
        }

        .register-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideInDown 0.6s ease-out;
        }

        .register-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
            animation: slideInDown 0.6s ease-out 0.1s both;
        }

        .register-subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            margin: 0;
            animation: slideInDown 0.6s ease-out 0.2s both;
        }

        .register-link-bottom {
            font-size: 0.9rem;
            opacity: 0.85;
            margin-top: auto;
            padding-top: 2rem;
        }

        .register-link-bottom a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register-link-bottom a:hover {
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .register-form {
            background: white;
            padding: 3rem 2rem;
        }

        .register-form-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #2d3436;
            animation: fadeInUp 0.6s ease-out;
        }

        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease-out;
        }

        .form-label {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-control {
            border-radius: 10px;
            border: 2px solid #e1e8ed;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            border-color: var(--primary-gradient-start);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            color: #d63031;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            font-weight: 500;
            display: block;
            animation: slideInDown 0.3s ease-out;
        }

        .alert {
            border-radius: 12px;
            border: none;
            animation: slideInDown 0.5s ease-out;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background: rgba(250, 112, 154, 0.1);
            color: #d63031;
            border-left: 4px solid #fa709a;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--primary-gradient-start), var(--primary-gradient-end));
            color: white;
            border: none;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            animation: fadeInUp 0.6s ease-out 0.4s both;
            width: 100%;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-register:active {
            transform: translateY(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .register-sidebar {
                padding: 2rem;
                text-align: center;
            }

            .register-form {
                padding: 2rem 1.5rem;
            }

            .register-title {
                font-size: 1.5rem;
            }

            .register-form-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10 col-xl-9">
                    <div class="card register-card">
                        <div class="row g-0">
                            <!-- Sidebar -->
                            <div class="col-md-5 register-sidebar d-flex flex-direction-column">
                                <div class="register-sidebar-content">
                                    <div class="register-badge">
                                        <i class="fas fa-shoe-prints me-2"></i>Join Us
                                    </div>
                                    <h1 class="register-title">Start Your Journey</h1>
                                    <p class="register-subtitle">Create your account to unlock exclusive benefits, track
                                        orders, and save your favorites</p>
                                </div>
                                <div class="register-link-bottom">
                                    Already have an account? <br>
                                    <a th:href="@{/login}"><i class="fas fa-sign-in-alt me-1"></i>Sign In</a>
                                </div>
                            </div>

                            <!-- Form -->
                            <div class="col-md-7 register-form">
                                <h2 class="register-form-title"><i class="fas fa-user-plus me-2"></i>Create Account</h2>

                                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                                    <i class="fas fa-exclamation-circle me-2"></i>
                                    <span th:text="${errorMessage}"></span>
                                </div>

                                <form th:action="@{/users/register}" th:object="${userDto}" method="post" novalidate>
                                    <div class="form-group">
                                        <label for="username" class="form-label">
                                            <i class="fas fa-user me-1"></i>Username
                                        </label>
                                        <input id="username" type="text" class="form-control" th:field="*{username}"
                                            required placeholder="Choose your username">
                                        <span class="error-message" th:if="${#fields.hasErrors('username')}"
                                            th:errors="*{username}"></span>
                                    </div>

                                    <div class="form-group">
                                        <label for="email" class="form-label">
                                            <i class="fas fa-envelope me-1"></i>Email Address
                                        </label>
                                        <input id="email" type="email" class="form-control" th:field="*{email}" required
                                            placeholder="Enter your email">
                                        <span class="error-message" th:if="${#fields.hasErrors('email')}"
                                            th:errors="*{email}"></span>
                                    </div>

                                    <div class="form-group">
                                        <label for="password" class="form-label">
                                            <i class="fas fa-lock me-1"></i>Password
                                        </label>
                                        <input id="password" type="password" class="form-control" th:field="*{password}"
                                            required placeholder="Create a strong password">
                                        <span class="error-message" th:if="${#fields.hasErrors('password')}"
                                            th:errors="*{password}"></span>
                                    </div>

                                    <button type="submit" class="btn-register">
                                        <i class="fas fa-user-plus me-2"></i>Create Account
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
