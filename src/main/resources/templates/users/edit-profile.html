<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h1 class="h3 mb-3">Edit profile</h1>
                        <form th:action="@{/users/profile/edit}" method="post" th:object="${userDto}" class="row g-3">
                            <input type="hidden" th:field="*{id}">
                            <div class="col-12">
                                <label class="form-label" for="username">Username</label>
                                <input id="username" class="form-control" type="text" th:field="*{username}">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="email">Email</label>
                                <input id="email" class="form-control" type="email" th:field="*{email}">
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Save changes</button>
                                <a class="btn btn-outline-secondary" th:href="@{/users/profile}">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
