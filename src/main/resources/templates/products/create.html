<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Create Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .form-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 1rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .form-label {
            font-weight: 500;
            color: #212529;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .invalid-feedback {
            display: block;
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .btn-group-custom {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <main class="container py-5">
        <div class="mb-4">
            <a class="btn btn-outline-secondary" th:href="@{/products}"><i class="fas fa-arrow-left me-2"></i>Back to
                products</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="card-header bg-light border-bottom p-4">
                        <h1 class="h4 mb-0" th:text="${pageTitle}">Create Product</h1>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/products/new}" method="post" th:object="${productDto}" novalidate>
                            <!-- Product Name -->
                            <div class="form-group">
                                <label class="form-label" for="name">Product Name <span class="text-danger">*</span></label>
                                <input
                                    id="name"
                                    class="form-control"
                                    type="text"
                                    th:field="*{name}"
                                    placeholder="Enter product name"
                                    th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                                    <span th:errors="*{name}">Error</span>
                                </div>
                            </div>

                            <!-- Product Description -->
                            <div class="form-group">
                                <label class="form-label" for="description">Description</label>
                                <textarea
                                    id="description"
                                    class="form-control"
                                    rows="4"
                                    th:field="*{description}"
                                    placeholder="Enter product description"
                                    th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                                    <span th:errors="*{description}">Error</span>
                                </div>
                            </div>

                            <!-- Product Price -->
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label class="form-label" for="price">Price <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <span class="input-group-text">$</span>
                                            <input
                                                id="price"
                                                class="form-control"
                                                type="number"
                                                th:field="*{price}"
                                                placeholder="0.00"
                                                step="0.01"
                                                min="0.01"
                                                th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                                        </div>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                                            <span th:errors="*{price}">Error</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Stock Quantity -->
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label class="form-label" for="stockQuantity">Stock Quantity <span class="text-danger">*</span></label>
                                        <input
                                            id="stockQuantity"
                                            class="form-control"
                                            type="number"
                                            th:field="*{stockQuantity}"
                                            placeholder="0"
                                            min="0"
                                            th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid' : ''">
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('stockQuantity')}">
                                            <span th:errors="*{stockQuantity}">Error</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Image URL -->
                            <div class="form-group">
                                <label class="form-label" for="imageUrl">Image URL</label>
                                <input
                                    id="imageUrl"
                                    class="form-control"
                                    type="url"
                                    th:field="*{imageUrl}"
                                    placeholder="https://example.com/image.jpg"
                                    th:classappend="${#fields.hasErrors('imageUrl')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}">
                                    <span th:errors="*{imageUrl}">Error</span>
                                </div>
                                <small class="form-text text-muted">Provide a full URL to the product image</small>
                            </div>

                            <!-- Active Status -->
                            <div class="form-group">
                                <div class="form-check form-switch">
                                    <input
                                        id="active"
                                        class="form-check-input"
                                        type="checkbox"
                                        th:field="*{active}">
                                    <label class="form-check-label" for="active">
                                        Active (product will be visible to customers)
                                    </label>
                                </div>
                            </div>

                            <!-- Form Actions -->
                            <div class="btn-group-custom mt-5">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Create Product
                                </button>
                                <a class="btn btn-outline-secondary" th:href="@{/products}">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
