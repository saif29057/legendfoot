<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout}" th:with-title="'Products - E-Commerce'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Products - E-Commerce</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <style>
        .search-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .product-card {
            transition: transform 0.3s;
            border: none;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- Search Section -->
    <div class="container mt-4">
        <div class="search-container">
            <form th:action="@{/products}" method="get" class="d-flex">
                <input type="text" name="search" class="form-control me-2" 
                       th:value="${search}" placeholder="Search products...">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search me-2"></i> Search
                </button>
            </form>
        </div>
        
        <!-- Products Grid -->
        <div class="row">
            <div class="col-md-4 mb-4" th:each="product : ${products.content}">
                <div class="card product-card">
                    <img th:src="${product.imageUrl}" class="card-img-top" alt="${product.name}">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                        <p class="card-text" th:text="${product.description}">Product description goes here...</p>
                        <p class="card-text"><strong th:text="${#numbers.formatDecimal(product.price)}">$0.00</strong></p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-success" th:if="${product.stockQuantity > 0}" th:text="${product.stockQuantity + ' in stock'">In Stock</span>
                            <span class="badge bg-danger" th:unless="${product.stockQuantity > 0}" th:text="'Out of Stock'">Out of Stock</span>
                        </div>
                        <a th:href="@{/products/} + ${product.id}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Pagination -->
        <div class="pagination-container" th:if="${products.totalPages > 1}">
            <nav aria-label="Page navigation">
                <ul class="pagination">
                    <li th:if="${products.hasPrevious()}">
                        <a th:href="@{/products(page=${products.number - 1}, size=${products.size})}" class="page-link">
                            <i class="fas fa-chevron-left"></i> Previous
                        </a>
                    </li>
                    
                    <li th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
                        <a th:href="@{/products(page=${i + 1}, size=${products.size})}" 
                           th:class="${i == products.number ? 'page-link active' : 'page-link'}">
                            <span th:text="${i + 1}"></span>
                        </a>
                    </li>
                    
                    <li th:if="${products.hasNext()}">
                        <a th:href="@{/products(page=${products.number + 1}, size=${products.size})}" class="page-link">
                            Next <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    
    <!-- Content for layout -->
    <div th:fragment="content">
        <!-- Page content will be inserted here -->
    </div>
</body>
</html>
