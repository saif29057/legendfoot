# ========================================
# Database Configuration (MySQL)
# ========================================
# Database connection settings for MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA/Hibernate Configuration
# ========================================
# Hibernate DDL auto: create, create-drop, update, validate, none
# 'create' drops and recreates the schema on each startup
# 'update' updates the schema without dropping data
# 'validate' validates the schema without making changes
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL statements for better readability
spring.jpa.properties.hibernate.format_sql=true

# Use MySQL8 dialect for better performance and compatibility
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Enable batch inserts for better performance
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Disable second-level cache to avoid missing dependencies
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# ========================================
# Thymeleaf Configuration
# ========================================
# Enable Thymeleaf template caching (set to false during development)
spring.thymeleaf.cache=false

# Template encoding
spring.thymeleaf.encoding=UTF-8

# Content type for templates
spring.thymeleaf.servlet.content-type=text/html

# Template mode
spring.thymeleaf.mode=HTML

# Prefix and suffix for templates
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========================================
# Spring Security Configuration
# ========================================
# Enable CSRF protection (recommended for production)
spring.security.csrf.enabled=true

# Session timeout in minutes
server.servlet.session.timeout=30m

# ========================================
# Server Configuration
# ========================================
# Server port
server.port=8080

# Server context path
server.servlet.context-path=/ecommerce

# Maximum file upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# Logging Configuration
# ========================================
# Root logging level
logging.level.root=INFO

# Application-specific logging levels
logging.level.com.ecommerce.app=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Log file configuration
logging.file.name=logs/ecommerce-app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========================================
# Application-specific Configuration
# ========================================
# Default page size for pagination
app.pagination.default-size=10

# Maximum page size allowed
app.pagination.max-size=100

# Image upload directory
app.upload.directory=uploads/

# Default currency
app.default-currency=USD

# Tax rate (as decimal, e.g., 0.08 for 8%)
app.tax-rate=0.08
